name: INFERRA CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
  workflow_dispatch:

jobs:
  backend:
    name: Backend tests and coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"
      - name: Install backend dependencies
        run: python -m pip install -e ".[dev,async,semantic,reasoning,observability]"
      - name: Run backend test suite
        run: pytest --cov=src --cov-fail-under=97

  frontends:
    name: Frontend tests and syntax checks
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app:
          - frontends/inferra-rule-studio
          - frontends/inferra-ai-harness
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Run frontend tests
        working-directory: ${{ matrix.app }}
        run: npm test
      - name: Run frontend syntax checks
        working-directory: ${{ matrix.app }}
        run: npm run check

  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build API and worker images
        run: docker compose build api worker
