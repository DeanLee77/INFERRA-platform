name: INFERRA CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
  workflow_dispatch:

jobs:
  backend:
    name: Backend tests and coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"
      - name: Install backend dependencies
        run: python -m pip install -e ".[dev,async,semantic,reasoning,observability]"
      - name: Run backend test suite
        run: pytest --cov=src --cov-fail-under=97
      - name: Enforce import boundaries
        run: lint-imports --config .importlinter

  frontends:
    name: Frontend tests and syntax checks
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app:
          - frontends/inferra-rule-studio
          - frontends/inferra-ai-harness
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Run frontend tests
        working-directory: ${{ matrix.app }}
        run: npm test
      - name: Run frontend syntax checks
        working-directory: ${{ matrix.app }}
        run: npm run check

  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build API and worker images
        run: docker compose build api worker

  load-gate:
    name: Dockerized k6 production gate
    runs-on: ubuntu-latest
    needs: [backend, docker-build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Start API stack
        run: docker compose up -d --build api worker
      - name: Wait for API readiness
        run: |
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8000/api/v1/health | python -c "import json, sys; data = json.load(sys.stdin); sys.exit(0 if data.get('status') == 'ok' else 1)"; then
              exit 0
            fi
            sleep 3
          done
          docker compose logs --no-color
          exit 1
      - name: Run k6 production profile
        run: |
          docker run --rm \
            --network inferra_default \
            -e BASE_URL=http://api:8000 \
            -e VUS=500 \
            -e DURATION=1m \
            -e METRICS_RATE=4 \
            -e LIVE_RATE=12 \
            -e USER_SLEEP_SECONDS=3 \
            -v "${{ github.workspace }}/tests/load:/scripts:ro" \
            grafana/k6:0.51.0 run /scripts/k6_production_gate.js
      - name: Dump compose logs on failure
        if: failure()
        run: docker compose logs --no-color
      - name: Stop stack
        if: always()
        run: docker compose down --remove-orphans
