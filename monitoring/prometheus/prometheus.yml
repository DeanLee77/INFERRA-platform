global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: inferra-api
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8000"]
        labels:
          app: inferra
          component: api

  - job_name: grafana
    metrics_path: /metrics
    static_configs:
      - targets: ["grafana:3000"]
        labels:
          app: inferra
          component: grafana

  - job_name: loki
    metrics_path: /metrics
    static_configs:
      - targets: ["loki:3100"]
        labels:
          app: inferra
          component: loki

  - job_name: promtail
    metrics_path: /metrics
    static_configs:
      - targets: ["promtail:9080"]
        labels:
          app: inferra
          component: promtail
